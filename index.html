<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kittys Plugins</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <button class="hamburger" onclick="toggleSidebar()">☰</button>

    <div id="sidebar" class="sidebar">
      <a href="/">Home</a>
      <a href="/Challenge">Challenge</a>
      <a href="/Mining">Mining</a>
      <a href="/Imprint">Imprint</a>
      <a href="/Policy">Privacy Policy</a>
    </div>

    <div<iframe src="https://discord.com/widget?id=1486791306406527087&theme=dark" width="350" height="500" allowtransparency="true" frameborder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
      id="overlay"
      class="overlay"
      style="display: none"
      onclick="toggleSidebar()"
    ></div>
    <footer
      style="background: #111; color: #fff; padding: 20px; text-align: center"
    >
      <p style="margin: 0 0 10px 0">© 2026 Kittys Plugins</p>

      <nav>
        <a
          href="/Imprint"
          style="color: #aaa; margin: 0 10px; text-decoration: none"
        >
          Imprint
        </a>
        |
        <a
          href="/Policy"
          style="color: #aaa; margin: 0 10px; text-decoration: none"
        >
          Privacy Policy
        </a>
      </nav>
    </footer>
        <script>
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");

        sidebar.classList.toggle("open");

        if (sidebar.classList.contains("open")) {
          overlay.style.display = "block";
        } else {
          overlay.style.display = "none";
        }
      }
    </script>
  </body>
</html>
